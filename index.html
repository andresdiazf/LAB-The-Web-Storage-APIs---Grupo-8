<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Buscador Pokemon API</title>
  </head>

  <body>
    <div class="container text-center py-5">
      <h1 class="titulo mb-4">Buscando un Pokémon</h1>

      <div class="card card-pokemon p-4 mx-auto">
        <!-- input y boton buscar -->
        <section class="mb-3">
          <div class="input-group ">
            <input
              type="text"
              id="input-busqueda-pokemon"
              class="form-control"
              placeholder="Escribe tu Pokémon"
            />

            <button id="btn-busqueda" class="btn btn-primary">Buscar</button>
          </div>
        </section>

        <!-- seccion resulatdo buscar -->
        <section id="resultado" class="mb-3 text-center"></section>

        <!-- botones guardar y borrar todos -->
        <section class="d-flex justify-content-between mt-3">
          <button type="button" id="btn-guardar" class="btn btn-primary">
            ❤️ Guardar
          </button>

          <button type="reset" id="btn-borrar" class="btn btn-danger">
            🗑️ Borrar todos
          </button>
        </section>
      </div>
    </div>
  </body>
</html>
